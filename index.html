<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cadence RSVP Reader</title>
    <meta
      name="description"
      content="A lightweight, accessible RSVP reader for the web."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="light" data-font="serif">
    <a class="skip-link" href="#main">Skip to app</a>
    <main id="main" class="app-shell">
      <header class="topbar">
        <div class="brand">
          <p class="eyebrow">Cadence</p>
          <h1>RSVP Reader</h1>
        </div>
        <nav class="tabs" aria-label="Sections" role="tablist">
          <button id="tab-prepare" class="tab-button is-active" type="button" role="tab" aria-selected="true" aria-controls="panel-prepare" data-tab="prepare">Prepare</button>
          <button id="tab-reader" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="panel-reader" data-tab="reader">Read</button>
        </nav>
        <button id="tab-settings" class="tab-button tab-button-icon" type="button" role="tab" aria-selected="false" aria-controls="panel-settings" data-tab="settings" aria-label="Settings">
          <span class="gear-icon" aria-hidden="true">&#9881;</span>
        </button>
      </header>

      <section class="panels">
        <section id="panel-prepare" class="panel-view is-active" role="tabpanel" aria-labelledby="tab-prepare" data-panel="prepare">
          <div class="panel-card panel-card-wide">
            <div class="source-toolbar">
              <div class="source-picker" role="tablist" aria-label="Source type">
                <button id="sourceTextButton" class="source-button is-active" type="button" data-source="text" aria-pressed="true">Text</button>
                <button id="sourceFileButton" class="source-button" type="button" data-source="file" aria-pressed="false">File</button>
                <button id="sourceLinkButton" class="source-button" type="button" data-source="link" aria-pressed="false">Link</button>
              </div>
              <button id="clearSourceButton" class="button button-inline button-inline-static" type="button">Clear</button>
            </div>

            <div class="source-workspace">
              <section id="sourcePaneText" class="source-pane is-active" data-source-panel="text" aria-label="Text source">
                <textarea id="sourceText" rows="16" spellcheck="false" placeholder="Paste notes, articles, or draft text here."></textarea>
              </section>

              <section id="sourcePaneFile" class="source-pane" data-source-panel="file" aria-label="File source" aria-hidden="true">
                <div class="input-group">
                  <input id="fileInput" type="file" accept=".txt,.md,text/plain,text/markdown" />
                  <textarea id="filePreview" class="preview-field" rows="12" spellcheck="false" readonly placeholder="Loaded file text will preview here."></textarea>
                </div>
              </section>

              <section id="sourcePaneLink" class="source-pane" data-source-panel="link" aria-label="Link source" aria-hidden="true">
                <div class="input-group">
                  <input id="urlInput" type="url" inputmode="url" placeholder="https://example.com/article" />
                  <textarea id="linkPreview" class="preview-field" rows="12" spellcheck="false" readonly placeholder="Fetched link text will preview here."></textarea>
                </div>
              </section>
            </div>

            <div class="prepare-status-row">
              <p id="importStatus" class="status-text prepare-status-text" aria-live="polite">Waiting for content.</p>
            </div>
          </div>
        </section>

        <section id="panel-reader" class="panel-view" role="tabpanel" aria-labelledby="tab-reader" aria-hidden="true" data-panel="reader">
          <div class="reader-panel">
            <section id="readerVisualBar" class="reader-overlay reader-overlay-top" aria-label="Visual controls">
              <div class="overlay-grid overlay-grid-visual">
                <div class="overlay-field overlay-field-select overlay-field-font">
                  <label class="sr-only" for="drawerFontSelect">Font</label>
                  <select id="drawerFontSelect">
                    <option value="serif">Serif</option>
                    <option value="sans">Sans</option>
                    <option value="mono">Mono</option>
                  </select>
                </div>

                <div class="overlay-field overlay-field-select overlay-field-scale">
                  <label class="sr-only" for="drawerFontScaleSelect">Reader scale</label>
                  <select id="drawerFontScaleSelect">
                    <option value="0.8">0.8x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1.0x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.2">1.2x</option>
                    <option value="1.3">1.3x</option>
                    <option value="1.4">1.4x</option>
                    <option value="1.5">1.5x</option>
                    <option value="1.6">1.6x</option>
                  </select>
                </div>

                <div class="overlay-toggle-row">
                  <div class="theme-segmented theme-segmented-inline" role="group" aria-label="Theme">
                    <button id="drawerThemeLightButton" class="theme-button is-active" type="button" data-theme-option="light" aria-pressed="true">
                      <span aria-hidden="true">&#9728;</span>
                    </button>
                    <button id="drawerThemeDarkButton" class="theme-button" type="button" data-theme-option="dark" aria-pressed="false">
                      <span aria-hidden="true">&#9790;</span>
                    </button>
                  </div>
                  <label class="chip-toggle" for="showFocusLineToggle">
                    <input id="showFocusLineToggle" type="checkbox" checked />
                    <span class="chip-icon" aria-hidden="true">
                      <svg viewBox="0 0 24 24" focusable="false">
                        <path d="M12 5v14" />
                      </svg>
                    </span>
                    <span class="sr-only">Line</span>
                  </label>
                  <label class="chip-toggle" for="showFocusArrowsToggle">
                    <input id="showFocusArrowsToggle" type="checkbox" />
                    <span class="chip-icon" aria-hidden="true">
                      <svg viewBox="0 0 24 24" focusable="false">
                        <path d="M5 12h14" />
                        <path d="M8 9l-3 3 3 3" />
                        <path d="M16 9l3 3-3 3" />
                      </svg>
                    </span>
                    <span class="sr-only">Arrows</span>
                  </label>
                  <div class="overlay-field overlay-field-color">
                    <label class="sr-only" for="focusColorInput">Focus</label>
                    <input id="focusColorInput" type="color" value="#c83a32" />
                  </div>
                </div>
              </div>
            </section>

            <div class="reader-stage">
              <div id="focusLine" class="focus-line" aria-hidden="true"></div>
              <div id="focusArrows" class="focus-arrows" aria-hidden="true">
                <span class="focus-arrow focus-arrow-left"></span>
                <span class="focus-arrow focus-arrow-right"></span>
              </div>
              <p id="readerFloatingHint" class="reader-floating-hint">Space play. Arrows step. Menu to tune.</p>
              <div id="readerWord" class="reader-word" aria-live="polite">Ready</div>
              <p id="readerContext" class="reader-context">Load text in Prepare, then switch back here to read.</p>
            </div>

            <section class="reader-progress" aria-label="Reader progress">
              <div class="overlay-progress">
                <div class="reader-meta">
                  <p id="progressText">0 of 0 chunks</p>
                  <p id="remainingText">Estimated remaining: 0s</p>
                </div>
                <input id="progressBar" type="range" min="0" max="0" value="0" step="1" aria-label="Jump to chunk position" />
              </div>
            </section>

            <section id="readerCadenceBar" class="reader-overlay reader-overlay-bottom" aria-label="Cadence controls">
              <div class="overlay-grid overlay-grid-cadence">
                <div class="overlay-field overlay-field-select overlay-field-chunk">
                  <label class="sr-only" for="drawerChunkSizeSelect">Chunk size</label>
                  <select id="drawerChunkSizeSelect">
                    <option value="1">1 chunk</option>
                    <option value="2">2 chunks</option>
                    <option value="3">3 chunks</option>
                    <option value="4">4 chunks</option>
                    <option value="5">5 chunks</option>
                  </select>
                </div>

                <div class="overlay-field overlay-field-cpm">
                  <div class="overlay-slider-row">
                    <input id="drawerWpmRange" type="range" min="120" max="900" step="10" value="320" aria-label="Cadence speed" />
                    <span id="drawerWpmValue" class="overlay-value">320 cpm</span>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </section>

        <section id="panel-settings" class="panel-view" role="tabpanel" aria-labelledby="tab-settings" aria-hidden="true" data-panel="settings">
          <div class="settings-shell">
            <div class="settings-grid">
            <section class="panel-card">
              <div class="section-copy">
                <h2>Pacing</h2>
                <p>Reading rhythm.</p>
              </div>

              <div class="control">
                <label for="wpmRange">Speed <span id="wpmValue">320</span></label>
                <input id="wpmRange" type="range" min="120" max="900" step="10" value="320" />
              </div>

              <div class="control control-select">
                <label for="chunkSizeSelect">Chunk</label>
                <select id="chunkSizeSelect">
                  <option value="1">1 word</option>
                  <option value="2">2 words</option>
                  <option value="3">3 words</option>
                  <option value="4">4 words</option>
                  <option value="5">5 words</option>
                </select>
              </div>

              <div class="control checkbox-control">
                <label for="punctuationPause">
                  <input id="punctuationPause" type="checkbox" checked />
                  Pause after punctuation
                </label>
              </div>
            </section>

            <section class="panel-card">
              <div class="section-copy">
                <h2>Appearance</h2>
                <p>Visual tuning.</p>
              </div>

              <div class="theme-segmented" role="group" aria-label="Theme">
                <button id="themeLightButton" class="theme-button is-active" type="button" data-theme-option="light" aria-pressed="true">
                  <span aria-hidden="true">&#9728;</span>
                </button>
                <button id="themeDarkButton" class="theme-button" type="button" data-theme-option="dark" aria-pressed="false">
                  <span aria-hidden="true">&#9790;</span>
                </button>
              </div>

              <div class="compact-controls">
                <div class="control control-compact">
                  <label class="sr-only" for="fontSelect">Font</label>
                  <select id="fontSelect">
                    <option value="serif">Serif</option>
                    <option value="sans">Sans</option>
                    <option value="mono">Mono</option>
                  </select>
                </div>

                <div class="control control-compact">
                  <label class="sr-only" for="fontScaleSelect">Scale</label>
                  <select id="fontScaleSelect">
                    <option value="0.8">0.8x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1.0x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.2">1.2x</option>
                    <option value="1.3">1.3x</option>
                    <option value="1.4">1.4x</option>
                    <option value="1.5">1.5x</option>
                    <option value="1.6">1.6x</option>
                  </select>
                </div>

                <div class="control control-compact control-color-compact">
                  <label class="sr-only" for="settingsFocusColorInput">Focus</label>
                  <input id="settingsFocusColorInput" type="color" value="#c83a32" />
                </div>
              </div>

              <div class="control checkbox-control">
                <label for="showControlsToggle">
                  <input id="showControlsToggle" type="checkbox" checked />
                  Show on-screen controls when not actively playing
                </label>
              </div>

              <div class="control checkbox-control">
                <label for="showFocusControlsToggle">
                  <input id="showFocusControlsToggle" type="checkbox" />
                  Keep controls visible during playback
                </label>
              </div>

              <div class="control checkbox-control">
                <label for="settingsShowFocusLineToggle">
                  <input id="settingsShowFocusLineToggle" type="checkbox" checked />
                  Show center line guide
                </label>
              </div>

              <div class="control checkbox-control">
                <label for="settingsShowFocusArrowsToggle">
                  <input id="settingsShowFocusArrowsToggle" type="checkbox" />
                  Show triangle markers
                </label>
              </div>
            </section>
            </div>
          </div>
        </section>
      </section>

      <footer id="readerUtilityBar" class="utility-footer" aria-label="Reader status and playback">
        <div class="prepare-footer-row">
          <button id="toReaderButton" class="button button-secondary" type="button" disabled>Read</button>
        </div>
        <div class="transport-row">
          <div id="transportBar" class="transport" aria-label="Playback controls">
            <button id="backButton" class="button button-secondary" type="button">Back</button>
            <button id="playPauseButton" class="button button-primary" type="button">Play</button>
            <button id="forwardButton" class="button button-secondary" type="button">Next</button>
          </div>
          <button id="readerMenuButton" class="button button-secondary reader-menu-button" type="button" aria-expanded="false" aria-controls="readerVisualBar readerCadenceBar" aria-label="Toggle reader controls">
            <span class="menu-icon" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </button>
        </div>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
